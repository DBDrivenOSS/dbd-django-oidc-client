name: Dependency Review

# SCA (pull-request gate): inspects dependency changes in a PR and fails if it
# introduces a dependency with a known vulnerability or a disallowed license,
# before the change is ever merged. Needs the dependency graph (free on public
# repos; requires GitHub Advanced Security on private repos).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # for comment-summary-in-pr

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
