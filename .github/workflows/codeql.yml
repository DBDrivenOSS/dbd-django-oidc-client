name: CodeQL

# SAST: GitHub's static analysis scans the source for vulnerable patterns
# (injection, unsafe deserialization, etc.) and reports findings under the
# repo's Security -> Code scanning tab. Free on public repositories.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"  # weekly, Monday 03:27 UTC, to catch newly-added queries

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload results to code scanning
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
