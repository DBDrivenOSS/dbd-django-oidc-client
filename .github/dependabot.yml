version: 2
updates:
  # Python dependencies declared in pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]
    open-pull-requests-limit: 10

  # Versions of the GitHub Actions used by the workflows (the main ongoing value:
  # keeps action pins current, and can maintain commit-SHA pins if you adopt them).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 10
